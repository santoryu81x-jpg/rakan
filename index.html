<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>إضافة تعليق - لوحة بيانات الهيئة الملكية</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
    --bg:#F5F7FA; --card:#FFFFFF; --border:#E6EAF0; --title:#0F172A;
    --text:#334155; --muted:#64748B; --primary:#1F3B67; --primaryHover:#2E5AA6;
    --success:#16A34A; --danger:#DC2626; --card-max-width:860px;
    --bg-dark:#181c23; --card-dark:#232a34; --border-dark:#373C4B;
    --title-dark:#f1f5fa; --text-dark:#e2e8f0; --muted-dark:#9ca3af;
}
*{box-sizing:border-box;font-family:Calibri,"Segoe UI",Tahoma,Arial,sans-serif;}
html,body{margin:0;padding:0;}
body{background:var(--bg);color:var(--text);transition:background .35s,color .35s;}
body.dark-mode{background:var(--bg-dark);color:var(--text-dark);}

/* ── APP SCREEN ── */
#appScreen{display:block;}

/* ── MAIN FORM ── */
.wrap{padding:18px 12px;}
.form-card{width:min(var(--card-max-width),95vw);margin:auto;background:var(--card);
  border:1px solid var(--border);border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.08);
  overflow:hidden;transition:background .35s,border .35s;}
body.dark-mode .form-card{background:var(--card-dark);border-color:var(--border-dark);}
.card-header{background:linear-gradient(90deg,var(--primary),#152A4B);color:#fff;padding:18px 22px;
  text-align:center;position:relative;display:flex;align-items:center;justify-content:center;gap:16px;}
.card-header-logo{position:absolute;right:8px;top:50%;transform:translateY(-50%);
  width:150px;height:70px;display:flex;align-items:center;justify-content:center;}
.card-header-logo img{max-width:100%;max-height:100%;object-fit:contain;}
.card-header h2{margin:0;font-size:17px;font-weight:900;line-height:1.35;
  display:flex;align-items:center;justify-content:center;gap:6px;}
.card-body{padding:18px 22px 22px;}
.theme-toggle{position:absolute;left:18px;top:16px;background:rgba(255,255,255,.2);
  border:1px solid rgba(255,255,255,.3);cursor:pointer;outline:none;width:32px;height:32px;
  border-radius:8px;display:flex;align-items:center;justify-content:center;transition:all .3s;z-index:10;}
.theme-toggle:hover{background:rgba(255,255,255,.3);transform:scale(1.08);}
.theme-toggle svg{width:18px;height:18px;transition:all .3s;}
.grid-1{display:grid;grid-template-columns:1fr;gap:14px;}
label{display:flex;justify-content:space-between;margin:10px 0 6px;font-size:13px;font-weight:900;
  color:var(--title);align-items:center;}
body.dark-mode label{color:var(--title-dark);}
.req{font-size:12px;color:var(--danger);font-weight:900;}
input,select,textarea{width:100%;border:1px solid var(--border);border-radius:12px;padding:10px;
  font-size:13px;background:#FBFCFE;outline:none;transition:background .35s,color .35s,border .35s;}
body.dark-mode input,body.dark-mode select,body.dark-mode textarea{background:#232a34;color:var(--text-dark);border-color:var(--border-dark);}
select,input{height:46px;}
textarea{min-height:80px;resize:vertical;line-height:1.75;}
select:disabled{background:#F1F5F9;color:#94A3B8;}
body.dark-mode select:disabled{background:#1a2332;color:#9ca3af;}
.actions{margin-top:16px;display:flex;gap:12px;flex-wrap:wrap;}
.btn{border:1px solid #E0E0E0;border-radius:12px;padding:11px 15px;font-weight:950;cursor:pointer;
  transition:all .2s;position:relative;background:#fff;}
.btn:hover{background:#F5F5F5;transform:scale(1.05);}
.btn-ghost{background:#fff;border:1px solid #E0E0E0;}
body.dark-mode .btn-ghost{background:#232a34;border-color:var(--border-dark);}
body.dark-mode .btn-ghost:hover{background:#2a3a4a;}
.msg{display:none;margin-top:12px;padding:12px;border-radius:12px;font-size:12px;white-space:pre-line;}
.msg.success{display:block;background:rgba(22,163,74,.1);color:#065F46;border:1px solid rgba(22,163,74,.3);}
.msg.error{display:block;background:rgba(220,38,38,.1);color:#7F1D1D;border:1px solid rgba(220,38,38,.3);}
.sending-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;
  align-items:center;justify-content:center;flex-direction:column;gap:14px;}
.sending-overlay.active{display:flex;}
.spinner{width:52px;height:52px;border:5px solid rgba(255,255,255,.3);border-top-color:#fff;
  border-radius:50%;animation:spin .9s linear infinite;}
.sending-overlay p{color:#fff;font-size:16px;font-weight:700;}
@keyframes spin{to{transform:rotate(360deg)}}
.snipping-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.3);cursor:crosshair;z-index:10000;}
.snipping-overlay.active{display:block;}
.snipping-selection{position:fixed;border:2px dashed #00BCD4;background:rgba(0,188,212,.1);
  z-index:10001;pointer-events:none;}
.snipping-toolbar{position:fixed;top:20px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.9);padding:12px 20px;border-radius:8px;color:white;font-size:14px;
  z-index:10002;display:flex;gap:20px;align-items:center;}
.snipping-toolbar button{background:#00BCD4;color:white;border:none;padding:6px 12px;
  border-radius:4px;cursor:pointer;font-weight:bold;}
.snipping-toolbar button.cancel{background:#DC2626;}
#editorContainer{border:1px solid var(--border);border-radius:12px;margin-top:12px;padding:10px;
  background:#fff;transition:background .35s,border .35s;display:flex;align-items:flex-start;
  justify-content:flex-start;min-height:120px;overflow:auto;}
body.dark-mode #editorContainer{background:#1a1f2a;border-color:var(--border-dark);}
#editor{max-width:100%;border-radius:8px;}
.fmt-toolbar{display:flex;gap:6px;margin-bottom:12px;padding:8px;background:#f9fafb;
  border-radius:10px;border:1px solid var(--border);flex-wrap:wrap;align-items:center;
  transition:background .35s,border .35s;}
body.dark-mode .fmt-toolbar{background:#232a34;border-color:var(--border-dark);}
.fmt-btn{border:1px solid var(--border);background:white;padding:6px;border-radius:6px;
  cursor:pointer;font-weight:bold;font-size:13px;width:32px;height:32px;display:flex;
  align-items:center;justify-content:center;transition:all .2s;}
body.dark-mode .fmt-btn{background:#1a1f2a;border-color:var(--border-dark);color:var(--text-dark);}
.fmt-btn:hover{background:#e0e7ff;border-color:var(--primary);transform:scale(1.1);}
.fmt-btn.active{background:var(--primary);color:white;border-color:var(--primary);}
.voice-btn{background:transparent;border:none;padding:2px;cursor:pointer;display:flex;
  align-items:center;justify-content:center;transition:all .2s;}
.voice-btn svg{width:18px;height:18px;fill:#B91C1C;stroke:#B91C1C;stroke-width:.5;}
.voice-btn.recording svg{animation:pulse-mic 1s infinite;}
@keyframes pulse-mic{0%,100%{filter:drop-shadow(0 0 0 0 rgba(220,38,38,.7))}50%{filter:drop-shadow(0 0 8px 0 rgba(220,38,38,.7))}}
.spacer-lg{margin:24px 0;}
#commentContainer{width:100%;min-height:80px;border:1px solid var(--border);border-radius:12px;
  padding:10px;font-size:14px;background:#FBFCFE;outline:none;line-height:1.75;margin-bottom:12px;
  transition:background .35s,color .35s,border .35s;word-wrap:break-word;overflow-wrap:break-word;}
body.dark-mode #commentContainer{background:#232a34;color:#e2e8f0;border-color:#373C4B;}
#commentContainer:empty:before{content:attr(data-placeholder);color:#999;font-style:italic;}
.animated-icon{animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.actions-footer{display:flex;justify-content:space-between;align-items:flex-start;
  margin-top:16px;gap:12px;flex-wrap:wrap;position:relative;padding-top:80px;}
.footer-rcjy{font-size:13px;font-weight:700;color:var(--primary);display:flex;align-items:center;gap:4px;margin-right:auto;}
.footer-rcjy::before{content:'';width:3px;height:20px;background:#00BCD4;border-radius:2px;}
.footer-rcjy::after{content:'';width:3px;height:20px;background:#7C3AED;border-radius:2px;}
body.dark-mode .footer-rcjy{color:#7C3AED;}
#send{padding:14px 40px;font-size:16px;border:none;background:#1F3B67;color:#fff;border-radius:12px;
  font-weight:950;cursor:pointer;transition:all .3s;position:absolute;left:50%;top:20px;transform:translateX(-50%);}
#send:hover{background:#7C3AED;}
#send:active{background:#7C3AED;transform:translateX(-50%) scale(.98);}
#send:disabled{background:#94A3B8;cursor:not-allowed;transform:translateX(-50%);}
</style>
</head>

      <div class="actions-footer">
        <div class="footer-rcjy">rcjy.gov.sa</div>
        <button class="btn" id="send" type="submit">إرسال</button>
      </div>
      <div class="msg" id="msg"></div>
    </form>
    </div>
  </div>
  </div>
</div>

<script>
// ── بناء قائمة المستقبلين من RECIPIENTS ──────────────────────────
(function buildSelect() {
    const sel = document.getElementById('ownerName');
    RECIPIENTS.forEach(r => {
        const opt = document.createElement('option');
        opt.value = r.title;
        opt.dataset.email = r.email;
        opt.textContent = r.title;
        sel.appendChild(opt);
    });
})();

// تم حذف منطق تسجيل الدخول: appScreen يظهر مباشرة عند فتح الصفحة

// ── مساعدات ──────────────────────────────────────────────────────
function getOwnerEmail() {
    const sel = document.getElementById('ownerName');
    return sel.options[sel.selectedIndex]?.dataset.email || '';
}

function getDateTimeStamp() {
    const now  = new Date();
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const day  = days[now.getDay()];
    const date = now.toLocaleDateString('en-GB', { year:'numeric', month:'long', day:'numeric' });
    const time = now.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:true });
    return { day, date, time, dateShort: now.toISOString().slice(0,10),
             full: `${day}  |  ${date}  |  ${time}` };
}

// ── Theme ─────────────────────────────────────────────────────────
const themeBtn = document.getElementById('themeToggleBtn');
const sunIcon  = document.getElementById('sunIcon');
const moonIcon = document.getElementById('moonIcon');
let canvas;

function setTheme(mode) {
    document.body.classList.toggle('dark-mode', mode === 'dark');
    sunIcon.style.display  = mode === 'dark' ? 'block' : 'none';
    moonIcon.style.display = mode === 'dark' ? 'none'  : 'block';
    localStorage.setItem('theme', mode);
    if (canvas) { canvas.setBackgroundColor(mode === 'dark' ? '#1a1f2a' : '#fff'); canvas.renderAll(); }
}
themeBtn.onclick = () => setTheme(document.body.classList.contains('dark-mode') ? 'light' : 'dark');
setTheme(localStorage.getItem('theme') === 'dark' ? 'dark' : 'light');

// ── Canvas ────────────────────────────────────────────────────────
canvas = new fabric.Canvas('editor', { backgroundColor: document.body.classList.contains('dark-mode') ? '#1a1f2a' : '#fff' });

function resizeCanvas() {
    const c = document.getElementById('editorContainer');
    canvas.setWidth(c.clientWidth - 20); canvas.setHeight(300); canvas.renderAll();
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

canvas.isDrawingMode = false;
const undoStack = [], redoStack = [];
canvas.on('path:created', e => { undoStack.push(e.path); redoStack.length = 0; });

document.getElementById('btnUndo').onclick      = () => { if (undoStack.length) { const l = undoStack.pop(); canvas.remove(l); redoStack.push(l); canvas.renderAll(); } };
document.getElementById('btnRedo').onclick      = () => { if (redoStack.length) { const l = redoStack.pop(); canvas.add(l); undoStack.push(l); canvas.renderAll(); } };
document.getElementById('btnDraw').onclick      = () => { canvas.isDrawingMode = true;  canvas.freeDrawingBrush.color = '#000';    canvas.freeDrawingBrush.width = 3;  };
document.getElementById('btnHighlight').onclick = () => { canvas.isDrawingMode = true;  canvas.freeDrawingBrush.color = 'yellow';  canvas.freeDrawingBrush.width = 20; };
document.getElementById('btnStop').onclick      = () => { canvas.isDrawingMode = false; };
document.getElementById('btnZoomIn').onclick    = () => { const z = Math.min((canvas.getZoom()||1)+.2,3);   canvas.setZoom(z); canvas.renderAll(); };
document.getElementById('btnZoomOut').onclick   = () => { const z = Math.max((canvas.getZoom()||1)-.2,.5); canvas.setZoom(z); canvas.renderAll(); };

// ── Capture ───────────────────────────────────────────────────────
document.getElementById('btnCapture').onclick = async () => {
    try {
        const stream = await navigator.mediaDevices.getDisplayMedia({ video: { cursor:'always' }, audio: false });
        const video  = document.createElement('video');
        video.srcObject = stream;
        await new Promise(r => { video.onloadedmetadata = () => { video.play(); r(); }; });
        await new Promise(r => setTimeout(r, 300));
        const tc = document.createElement('canvas');
        tc.width = video.videoWidth; tc.height = video.videoHeight;
        tc.getContext('2d').drawImage(video, 0, 0);
        stream.getTracks().forEach(t => t.stop());
        addImageToCanvas(tc.toDataURL('image/png', 1.0));
    } catch(e){}
};

// ── Snipping ──────────────────────────────────────────────────────
let isSnipping = false, startX, startY, currentX, currentY;
const snippingOverlay   = document.getElementById('snippingOverlay');
const snippingSelection = document.getElementById('snippingSelection');

snippingOverlay.addEventListener('mousedown', e => { if (!isSnipping) return; startX = e.clientX; startY = e.clientY; snippingSelection.style.display = 'block'; });
snippingOverlay.addEventListener('mousemove', e => {
    if (!isSnipping || startX === undefined) return;
    currentX = e.clientX; currentY = e.clientY;
    snippingSelection.style.cssText += `;left:${Math.min(startX,currentX)}px;top:${Math.min(startY,currentY)}px;width:${Math.abs(currentX-startX)}px;height:${Math.abs(currentY-startY)}px`;
});
document.getElementById('snippingCancel').onclick = () => { isSnipping=false; snippingOverlay.classList.remove('active'); snippingSelection.style.display='none'; startX=currentX=undefined; };
document.getElementById('snippingDone').onclick   = async () => {
    if (startX===undefined) return;
    const l=Math.min(startX,currentX), t=Math.min(startY,currentY), w=Math.abs(currentX-startX), h=Math.abs(currentY-startY);
    if (w<10||h<10) return;
    try {
        const shot = await html2canvas(document.body, { scale:2, useCORS:true, logging:false, backgroundColor:'#fff', imageTimeout:0, allowTaint:true });
        const sc=document.createElement('canvas'), ctx=sc.getContext('2d'), dpr=window.devicePixelRatio;
        sc.width=w*dpr; sc.height=h*dpr;
        ctx.drawImage(shot, l*dpr, t*dpr, w*dpr, h*dpr, 0, 0, w*dpr, h*dpr);
        addImageToCanvas(sc.toDataURL('image/png', 1.0));
        isSnipping=false; snippingOverlay.classList.remove('active'); snippingSelection.style.display='none'; startX=currentX=undefined;
    } catch(e){ alert('فشل التقاط الشاشة'); }
};

async function addImageToCanvas(imageData) {
    const img = new Image();
    img.onload = function() {
        const stamp=getDateTimeStamp(), barH=30, scale=.45, dpr=3;
        const nw=Math.round(img.width*scale), nh=Math.round(img.height*scale);
        const tc=document.createElement('canvas');
        tc.width=nw*dpr; tc.height=(nh+barH)*dpr;
        const ctx=tc.getContext('2d');
        ctx.scale(dpr,dpr); ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
        ctx.drawImage(img,0,0,nw,nh);
        const g=ctx.createLinearGradient(0,nh,0,nh+barH); g.addColorStop(0,'#000'); g.addColorStop(1,'#111');
        ctx.fillStyle=g; ctx.fillRect(0,nh,nw,barH);
        ctx.fillStyle='#000'; ctx.fillRect(0,nh,nw,3);
        ctx.shadowColor='rgba(0,0,0,.8)'; ctx.shadowBlur=6; ctx.fillStyle='#fff';
        ctx.font=`bold ${Math.max(16,nw/60)}px "Segoe UI",Arial`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(stamp.full, nw/2, nh+barH/2); ctx.shadowBlur=0;
        fabric.Image.fromURL(tc.toDataURL('image/png',1), fi => {
            fi.scaleToWidth(nw); fi.set({left:10,top:10,selectable:true});
            canvas.setWidth(nw+20); canvas.setHeight(nh+barH+20);
            canvas.add(fi); canvas.renderAll(); undoStack.push(fi); redoStack.length=0;
        });
    };
    img.src = imageData;
}

// ── Voice ─────────────────────────────────────────────────────────
const commentContainer = document.getElementById('commentContainer');
const voiceBtn = document.getElementById('voiceBtn');
let isRecording = false;
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SR) { voiceBtn.disabled=true; voiceBtn.style.opacity='.5'; } else {
    const rec = new SR(); rec.lang='ar-SA'; rec.continuous=true; rec.interimResults=true;
    voiceBtn.addEventListener('click', e => {
        e.preventDefault();
        if (!isRecording) { isRecording=true; voiceBtn.classList.add('recording'); rec.start(); }
        else { isRecording=false; voiceBtn.classList.remove('recording'); rec.stop(); }
    });
    rec.onresult = ev => {
        let t='';
        for (let i=ev.resultIndex;i<ev.results.length;i++) if (ev.results[i].isFinal) t+=ev.results[i][0].transcript+' ';
        if (t) { commentContainer.innerText+=t; commentContainer.focus(); }
    };
    rec.onend = () => { isRecording=false; voiceBtn.classList.remove('recording'); };
}

// ── Formatting ────────────────────────────────────────────────────
let fontSize = 14;
commentContainer.style.fontSize = fontSize+'px';
document.getElementById('fmtBold').onclick      = e => { e.preventDefault(); document.execCommand('bold',false,null);      commentContainer.focus(); document.getElementById('fmtBold').classList.toggle('active'); };
document.getElementById('fmtItalic').onclick    = e => { e.preventDefault(); document.execCommand('italic',false,null);    commentContainer.focus(); document.getElementById('fmtItalic').classList.toggle('active'); };
document.getElementById('fmtUnderline').onclick = e => { e.preventDefault(); document.execCommand('underline',false,null); commentContainer.focus(); document.getElementById('fmtUnderline').classList.toggle('active'); };
document.getElementById('fmtInc').onclick       = e => { e.preventDefault(); if (fontSize<24){fontSize+=2;commentContainer.style.fontSize=fontSize+'px';} };
document.getElementById('fmtDec').onclick       = e => { e.preventDefault(); if (fontSize>10){fontSize-=2;commentContainer.style.fontSize=fontSize+'px';} };

// ── Validate & Submit ─────────────────────────────────────────────
const ownerSel = document.getElementById('ownerName');
const sendBtn  = document.getElementById('send');
function validate(){ sendBtn.disabled = !ownerSel.value; }
ownerSel.addEventListener('change', validate);
validate();

document.getElementById('form').addEventListener('submit', async e => {
    e.preventDefault();
    const title       = ownerSel.value.trim();
    const ownerEmail  = getOwnerEmail();
    const commentHtml = commentContainer.innerHTML;
    const msg         = document.getElementById('msg');
    const overlay     = document.getElementById('sendingOverlay');

    if (!title)                              { msg.className='msg error'; msg.innerText='يرجى اختيار الشخص المعني'; return; }
    if (!commentHtml||!commentHtml.trim())   { msg.className='msg error'; msg.innerText='يرجى كتابة التعليق';      return; }

    msg.className='msg'; msg.innerText='';
    sendBtn.disabled=true; overlay.classList.add('active');

    try {
        const hasImg   = canvas.getObjects().length > 0;
        const imageData= hasImg ? canvas.toDataURL({ format:'png', multiplier:3 }) : null;
        const stamp    = getDateTimeStamp();

        const body = {
            ownerName:   title,
            ownerEmail:  ownerEmail,   // إيميل المستقبِل
            comment:     commentHtml,
            capturedAt:  stamp.full,
            fileName:    `RCJY_${stamp.dateShort}.png`,
        };
        if (imageData) body.imageBase64 = imageData;

        const res    = await fetch(BACKEND_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
        const result = await res.json();
        overlay.classList.remove('active');

        if (result.success) {
            msg.className='msg success';
            msg.innerText=`✅ تم إرسال الملاحظة بنجاح إلى ${title}\n📧 ${ownerEmail}`;
            commentContainer.innerHTML=''; ownerSel.value=''; canvas.clear();
            canvas.setBackgroundColor(document.body.classList.contains('dark-mode')?'#1a1f2a':'#fff'); canvas.renderAll();
        } else {
            msg.className='msg error'; msg.innerText='❌ فشل الإرسال: '+(result.message||'خطأ غير معروف');
        }
    } catch(err) {
        overlay.classList.remove('active');
        msg.className='msg error'; msg.innerText='تأكد الاتصال بالخادم.';
    }
    sendBtn.disabled=false; validate();
});
</script>
</body>
</html>
